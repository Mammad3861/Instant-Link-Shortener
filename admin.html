<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Admin Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v3.3.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

  <style>
    /* iOS Glassmorphism Variables */
    :root {
      --bg-base: #f2f2f7;
      --bg-mesh-1: rgba(100, 200, 255, 0.5);
      --bg-mesh-2: rgba(255, 150, 200, 0.5);
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --text-main: #000000;
      --text-muted: #8e8e93;
      --input-bg: rgba(255, 255, 255, 0.4);
      --input-focus: rgba(255, 255, 255, 0.8);
      --primary: #007aff;
      --primary-hover: #005bb5;
      --danger: #ff3b30;
      --danger-hover: #d70015;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #000000;
        --bg-mesh-1: rgba(60, 20, 100, 0.6);
        --bg-mesh-2: rgba(20, 60, 100, 0.6);
        --glass-bg: rgba(30, 30, 30, 0.45);
        --glass-border: rgba(255, 255, 255, 0.15);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        --text-main: #ffffff;
        --text-muted: #ebebf599;
        --input-bg: rgba(118, 118, 128, 0.24);
        --input-focus: rgba(118, 118, 128, 0.4);
        --primary: #0a84ff;
        --primary-hover: #006ee6;
        --danger: #ff453a;
        --danger-hover: #ff3b30;
      }
    }

    /* Centered Layout Fix */
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-base);
      background-image: radial-gradient(circle at 15% 20%, var(--bg-mesh-1), transparent 40%),
                        radial-gradient(circle at 85% 80%, var(--bg-mesh-2), transparent 40%);
      background-attachment: fixed; color: var(--text-main);
      display: flex; justify-content: center; align-items: center; /* Perfectly centered */
      padding: 1.5rem; box-sizing: border-box; transition: background 0.3s ease;
    }

    body:lang(fa) {
      font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .glass-panel {
      width: 100%; max-width: 650px;
      background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border); border-radius: 28px;
      padding: 2.5rem; box-shadow: var(--glass-shadow); position: relative;
    }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
    }

    h2 { margin: 0; font-weight: 600; font-size: 1.4rem; }

    .btn-icon {
      background: var(--input-bg); color: var(--text-main); border: 1px solid var(--glass-border);
      padding: 0.4rem 0.8rem; border-radius: 10px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-icon:hover { background: var(--input-focus); }

    input {
      width: 100%; padding: 0.9rem 1rem; margin-bottom: 1rem;
      background: var(--input-bg); border: 1px solid transparent;
      color: var(--text-main); border-radius: 14px; box-sizing: border-box; font-family: inherit;
    }
    input:focus { outline: none; background: var(--input-focus); border-color: var(--primary); }

    /* Button Layout Fixes */
    button {
      background: var(--primary); color: #fff; border: none;
      padding: 0.8rem 1.5rem; border-radius: 14px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s ease;
    }
    button:hover { background: var(--primary-hover); }
    button.btn-danger { background: var(--danger); }
    button.btn-danger:hover { background: var(--danger-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-full { width: 100%; } /* Only login/logout should be full width */

    .hidden { display: none !important; }
    #statusMsg { margin-top: 1rem; text-align: center; font-size: 0.9rem; font-weight: 500; }

    /* Dashboard Navigation */
    .dashboard-nav {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center;
      background: var(--input-bg); padding: 0.4rem; border-radius: 16px;
    }
    .nav-btn {
      background: transparent; color: var(--text-muted);
      padding: 0.6rem; border-radius: 12px; flex: 1; font-size: 0.95rem; text-align: center;
      min-width: 80px; margin: 0;
    }
    .nav-btn.active {
      background: var(--glass-border); color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .content-section { min-height: 250px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
    .content-section::-webkit-scrollbar { width: 6px; }
    .content-section::-webkit-scrollbar-thumb { background-color: var(--text-muted); border-radius: 10px; }
    
    .list-card {
      background: var(--input-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.9rem;
    }
    .card-info { display: flex; flex-direction: column; gap: 0.3rem; word-break: break-all; }
    .card-info span { color: var(--text-muted); font-size: 0.8rem; }
    .card-action button { padding: 0.5rem 1rem; width: auto; font-size: 0.85rem; border-radius: 10px; }

    .inline-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; align-items: center; }
    .inline-form input { margin-bottom: 0; flex: 1; }
    .inline-form button { white-space: nowrap; }

    @media (max-width: 480px) {
      .glass-panel { padding: 1.5rem; border-radius: 24px; }
      .inline-form { flex-direction: column; align-items: stretch; }
      .inline-form button { width: 100%; }
      .list-card { flex-direction: column; align-items: stretch; gap: 1rem; }
      .card-action button { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="loginPanel" class="glass-panel">
    <div class="header-bar">
      <h2 id="loginTitle">Super Admin Login</h2>
      <button id="langToggleLogin" class="btn-icon">FA</button>
    </div>
    <form id="loginForm">
      <input type="password" id="masterToken" placeholder="Security Token (MASTER_KEY)..." required>
      <button type="submit" id="loginBtn" style="width: auto; margin: 0 auto; display: block;">Login</button>
    </form>
    <div id="statusMsg" class="hidden"></div>
  </div>

  <div id="dashboardPanel" class="glass-panel hidden">
    <div class="header-bar">
      <h2 id="dashTitle">Admin Dashboard</h2>
      <button id="langToggleDash" class="btn-icon">FA</button>
    </div>
    
    <div class="dashboard-nav">
      <button class="nav-btn active" data-target="linksSection" id="tabLinks">Links</button>
      <button class="nav-btn" data-target="logsSection" id="tabLogs">Logs</button>
      <button class="nav-btn" data-target="adminsSection" id="tabAdmins">Admins</button>
      <button class="nav-btn" data-target="settingsSection" id="tabSettings">Settings</button>
    </div>

    <div id="linksSection" class="content-section">
      <div id="linksContainer"></div>
    </div>

    <div id="logsSection" class="content-section hidden">
      <div id="logsContainer"></div>
    </div>

    <div id="adminsSection" class="content-section hidden">
      <form id="addAdminForm" class="inline-form">
        <input type="text" id="newAdminName" placeholder="Admin Name" required>
        <input type="text" id="newAdminToken" placeholder="Custom Token" required>
        <button type="submit" id="btnAddAdmin">Add</button>
      </form>
      <div id="adminsContainer"></div>
    </div>

    <div id="settingsSection" class="content-section hidden">
      <div class="list-card">
        <div class="card-info">
          <strong id="lblPublicAccess">Public Access</strong>
          <span id="descPublicAccess">If disabled, anonymous users cannot create links.</span>
        </div>
        <div class="card-action">
          <button id="togglePublicBtn" style="width: 120px;">...</button>
        </div>
      </div>
    </div>
    
    <button id="logoutBtn" class="btn-icon btn-full" style="background: transparent; border: 1px solid var(--glass-border); color: var(--danger); margin-top: 1.5rem;">Logout</button>
  </div>

  <script>
    // i18n Dictionary mapping
    const dict = {
      en: {
        loginTitle: 'Super Admin Login',
        tokenPlaceholder: 'Security Token (MASTER_KEY)...',
        loginBtn: 'Login',
        dashTitle: 'Admin Dashboard',
        tabLinks: 'Links',
        tabLogs: 'Logs',
        tabAdmins: 'Admins',
        tabSettings: 'Settings',
        logoutBtn: 'Logout',
        adminNameHolder: 'Admin Name',
        adminTokenHolder: 'Custom Token',
        btnAddAdmin: 'Add',
        lblPublicAccess: 'Public Access',
        descPublicAccess: 'If disabled, anonymous users cannot create links.',
        btnEnable: 'Enable',
        btnDisable: 'Disable',
        btnDelete: 'Delete',
        loading: 'Loading...',
        emptyLinks: 'No links found.',
        emptyLogs: 'No violations recorded.',
        emptyAdmins: 'No sub-admins found.',
        errAuth: 'Invalid token.',
        errGeneric: 'An error occurred.',
        confirmDelAdmin: 'Are you sure you want to remove this admin?',
        confirmDelLink: 'Are you sure you want to delete this link?',
        msgChecking: 'Checking...'
      },
      fa: {
        loginTitle: 'ورود سوپر ادمین',
        tokenPlaceholder: 'توکن امنیتی (MASTER_KEY)...',
        loginBtn: 'ورود',
        dashTitle: 'داشبورد مدیریت',
        tabLinks: 'لینک‌ها',
        tabLogs: 'لاگ‌ها',
        tabAdmins: 'همکاران',
        tabSettings: 'تنظیمات',
        logoutBtn: 'خروج از حساب',
        adminNameHolder: 'نام همکار',
        adminTokenHolder: 'توکن اختصاصی',
        btnAddAdmin: 'افزودن',
        lblPublicAccess: 'دسترسی عمومی سایت',
        descPublicAccess: 'اگر غیرفعال باشد، کاربران ناشناس قادر به ساخت لینک نیستند.',
        btnEnable: 'فعال کردن',
        btnDisable: 'غیرفعال کردن',
        btnDelete: 'حذف',
        loading: 'بارگذاری...',
        emptyLinks: 'لینکی وجود ندارد.',
        emptyLogs: 'هیچ تخلفی ثبت نشده است.',
        emptyAdmins: 'همکاری یافت نشد.',
        errAuth: 'توکن نامعتبر است.',
        errGeneric: 'خطایی رخ داد.',
        confirmDelAdmin: 'آیا از حذف این همکار اطمینان دارید؟',
        confirmDelLink: 'آیا از حذف این لینک اطمینان دارید؟',
        msgChecking: 'در حال بررسی...'
      }
    };

    // DOM Element References
    const dom = {
      html: document.documentElement,
      loginPanel: document.getElementById('loginPanel'),
      dashboardPanel: document.getElementById('dashboardPanel'),
      loginForm: document.getElementById('loginForm'),
      tokenInput: document.getElementById('masterToken'),
      loginBtn: document.getElementById('loginBtn'),
      statusMsg: document.getElementById('statusMsg'),
      navBtns: document.querySelectorAll('.nav-btn'),
      sections: document.querySelectorAll('.content-section'),
      logoutBtn: document.getElementById('logoutBtn'),
      linksContainer: document.getElementById('linksContainer'),
      logsContainer: document.getElementById('logsContainer'),
      adminsContainer: document.getElementById('adminsContainer'),
      addAdminForm: document.getElementById('addAdminForm'),
      newAdminName: document.getElementById('newAdminName'),
      newAdminToken: document.getElementById('newAdminToken'),
      btnAddAdmin: document.getElementById('btnAddAdmin'),
      togglePublicBtn: document.getElementById('togglePublicBtn')
    };

    // Application State
    let currentLang = navigator.language.startsWith('fa') ? 'fa' : 'en';
    let superToken = localStorage.getItem('cf_master_token') || '';
    let isPublicOpen = true;
    let activeTab = 'linksSection';

    // Apply Language UI Translations
    const applyLang = (lang) => {
      currentLang = lang;
      dom.html.dir = lang === 'fa' ? 'rtl' : 'ltr';
      dom.html.lang = lang;
      
      document.getElementById('loginTitle').textContent = dict[lang].loginTitle;
      dom.tokenInput.placeholder = dict[lang].tokenPlaceholder;
      dom.loginBtn.textContent = dict[lang].loginBtn;
      document.getElementById('dashTitle').textContent = dict[lang].dashTitle;
      document.getElementById('tabLinks').textContent = dict[lang].tabLinks;
      document.getElementById('tabLogs').textContent = dict[lang].tabLogs;
      document.getElementById('tabAdmins').textContent = dict[lang].tabAdmins;
      document.getElementById('tabSettings').textContent = dict[lang].tabSettings;
      dom.logoutBtn.textContent = dict[lang].logoutBtn;
      dom.newAdminName.placeholder = dict[lang].adminNameHolder;
      dom.newAdminToken.placeholder = dict[lang].adminTokenHolder;
      dom.btnAddAdmin.textContent = dict[lang].btnAddAdmin;
      document.getElementById('lblPublicAccess').textContent = dict[lang].lblPublicAccess;
      document.getElementById('descPublicAccess').textContent = dict[lang].descPublicAccess;
      
      document.getElementById('langToggleLogin').textContent = lang === 'fa' ? 'EN' : 'FA';
      document.getElementById('langToggleDash').textContent = lang === 'fa' ? 'EN' : 'FA';
      
      updateSettingsUI();
      refreshActiveTab();
    };

    const handleLangToggle = () => applyLang(currentLang === 'fa' ? 'en' : 'fa');
    document.getElementById('langToggleLogin').addEventListener('click', handleLangToggle);
    document.getElementById('langToggleDash').addEventListener('click', handleLangToggle);

    // General Message Helper
    const showMsg = (msg, isError = false) => {
      dom.statusMsg.textContent = msg;
      dom.statusMsg.style.color = isError ? 'var(--danger)' : 'var(--text-main)';
      dom.statusMsg.classList.remove('hidden');
    };

    // Global API Fetcher with Authorization Header
    const fetchApi = async (endpoint, options = {}) => {
      const res = await fetch(endpoint, {
        ...options,
        headers: {
          'Authorization': `Bearer ${superToken}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
      return res;
    };

    // Render logic for Links tab
    const loadLinks = async () => {
      dom.linksContainer.innerHTML = `<p style="text-align:center;">${dict[currentLang].loading}</p>`;
      try {
        const res = await fetchApi('/api/links');
        const data = await res.json();
        
        if (!data.links || data.links.length === 0) {
          dom.linksContainer.innerHTML = `<p style="text-align:center; color: var(--text-muted);">${dict[currentLang].emptyLinks}</p>`;
          return;
        }

        dom.linksContainer.innerHTML = data.links.map(link => `
          <div class="list-card">
            <div class="card-info">
              <strong>Slug: /${link.slug}</strong>
              <span>Target: ${link.url}</span>
            </div>
            <div class="card-action">
              <button class="btn-danger" onclick="deleteLink('${link.slug}')">${dict[currentLang].btnDelete}</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        dom.linksContainer.innerHTML = `<p style="color:var(--danger); text-align:center;">${dict[currentLang].errGeneric}</p>`;
      }
    };

    // Render logic for Logs tab
    const loadLogs = async () => {
      dom.logsContainer.innerHTML = `<p style="text-align:center;">${dict[currentLang].loading}</p>`;
      try {
        const res = await fetchApi('/api/logs');
        const data = await res.json();
        
        if (!data.logs || data.logs.length === 0) {
          dom.logsContainer.innerHTML = `<p style="text-align:center; color: var(--text-muted);">${dict[currentLang].emptyLogs}</p>`;
          return;
        }

        dom.logsContainer.innerHTML = data.logs.map(log => `
          <div class="list-card">
            <div class="card-info">
              <strong>IP: ${log.ip}</strong>
              <span>URL: ${log.attemptedUrl || 'N/A'}</span>
              <span>Time: ${log.timestamp ? new Date(log.timestamp).toLocaleString(currentLang === 'fa' ? 'fa-IR' : 'en-US') : 'N/A'}</span>
            </div>
          </div>
        `).join('');
      } catch (err) {
        dom.logsContainer.innerHTML = `<p style="color:var(--danger); text-align:center;">${dict[currentLang].errGeneric}</p>`;
      }
    };

    // Render logic for Admins tab
    const loadAdmins = async () => {
      dom.adminsContainer.innerHTML = `<p style="text-align:center;">${dict[currentLang].loading}</p>`;
      try {
        const res = await fetchApi('/api/admins');
        const data = await res.json();

        if (!data.admins || data.admins.length === 0) {
          dom.adminsContainer.innerHTML = `<p style="text-align:center; color: var(--text-muted);">${dict[currentLang].emptyAdmins}</p>`;
          return;
        }

        dom.adminsContainer.innerHTML = data.admins.map(token => `
          <div class="list-card">
            <div class="card-info">
              <strong>Token: ${token}</strong>
            </div>
            <div class="card-action">
              <button class="btn-danger" onclick="removeAdmin('${token}')">${dict[currentLang].btnDelete}</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        dom.adminsContainer.innerHTML = `<p style="color:var(--danger); text-align:center;">${dict[currentLang].errGeneric}</p>`;
      }
    };

    // Render logic for Settings tab
    const updateSettingsUI = () => {
      if (isPublicOpen) {
        dom.togglePublicBtn.textContent = dict[currentLang].btnDisable;
        dom.togglePublicBtn.className = 'btn-danger';
      } else {
        dom.togglePublicBtn.textContent = dict[currentLang].btnEnable;
        dom.togglePublicBtn.className = '';
      }
    };

    const loadSettings = async () => {
      dom.togglePublicBtn.textContent = '...';
      try {
        const res = await fetchApi('/api/settings');
        const data = await res.json();
        isPublicOpen = data.publicStatus === 'open';
        updateSettingsUI();
      } catch (err) {
        console.error('Settings load error');
      }
    };

    dom.togglePublicBtn.addEventListener('click', async (e) => {
      e.target.disabled = true;
      const newStatus = isPublicOpen ? 'closed' : 'open';
      try {
        await fetchApi('/api/settings', {
          method: 'POST',
          body: JSON.stringify({ publicStatus: newStatus })
        });
        isPublicOpen = !isPublicOpen;
        updateSettingsUI();
      } catch (err) {
        alert(dict[currentLang].errGeneric);
      } finally {
        e.target.disabled = false;
      }
    });

    // Sub-Admin Submission Handler
    dom.addAdminForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      dom.btnAddAdmin.disabled = true;
      try {
        const payload = {
          name: dom.newAdminName.value.trim(),
          token: dom.newAdminToken.value.trim()
        };
        await fetchApi('/api/admins', { method: 'POST', body: JSON.stringify(payload) });
        dom.newAdminName.value = '';
        dom.newAdminToken.value = '';
        loadAdmins();
      } catch (err) {
        alert(dict[currentLang].errGeneric);
      } finally {
        dom.btnAddAdmin.disabled = false;
      }
    });

    // Global Functions for Inline OnClick Handlers
    window.removeAdmin = async (token) => {
      if (!confirm(dict[currentLang].confirmDelAdmin)) return;
      try {
        await fetchApi('/api/admins', { method: 'DELETE', body: JSON.stringify({ token }) });
        loadAdmins();
      } catch (err) {
        alert(dict[currentLang].errGeneric);
      }
    };

    window.deleteLink = async (slug) => {
      if (!confirm(dict[currentLang].confirmDelLink)) return;
      try {
        await fetchApi('/api/delete', { method: 'DELETE', body: JSON.stringify({ slug }) });
        loadLinks();
      } catch (err) {
        alert(dict[currentLang].errGeneric);
      }
    };

    // Tab Refresh Logic
    const refreshActiveTab = () => {
      if (!superToken) return;
      if (activeTab === 'linksSection') loadLinks();
      if (activeTab === 'logsSection') loadLogs();
      if (activeTab === 'adminsSection') loadAdmins();
    };

    // Authorization Verification
    const initDashboard = async (token) => {
      try {
        dom.loginBtn.disabled = true;
        dom.loginBtn.textContent = dict[currentLang].msgChecking;
        const res = await fetch('/api/logs', { headers: { 'Authorization': `Bearer ${token}` } });
        
        if (res.ok) {
          superToken = token;
          localStorage.setItem('cf_master_token', token);
          dom.loginPanel.classList.add('hidden');
          dom.dashboardPanel.classList.remove('hidden');
          
          loadLinks();
          loadSettings();
        } else {
          throw new Error(dict[currentLang].errAuth);
        }
      } catch (err) {
        showMsg(err.message, true);
        localStorage.removeItem('cf_master_token');
        superToken = '';
        dom.loginBtn.textContent = dict[currentLang].loginBtn;
      } finally {
        dom.loginBtn.disabled = false;
      }
    };

    // Event Listeners for Login/Logout
    dom.loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      initDashboard(dom.tokenInput.value.trim());
    });

    dom.logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('cf_master_token');
      superToken = '';
      dom.tokenInput.value = '';
      dom.dashboardPanel.classList.add('hidden');
      dom.loginPanel.classList.remove('hidden');
      dom.statusMsg.classList.add('hidden');
      dom.loginBtn.textContent = dict[currentLang].loginBtn;
    });

    // Tab Switching Navigation
    dom.navBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        dom.navBtns.forEach(b => b.classList.remove('active'));
        dom.sections.forEach(s => s.classList.add('hidden'));
        
        e.target.classList.add('active');
        activeTab = e.target.getAttribute('data-target');
        document.getElementById(activeTab).classList.remove('hidden');

        refreshActiveTab();
      });
    });

    // Initial Execution
    applyLang(currentLang);
    if (superToken) initDashboard(superToken);
  </script>
</body>
</html>
